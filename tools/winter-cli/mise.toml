[tools]
uv = "0.9.27"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format with ruff"
run = "uv run ruff format ."
