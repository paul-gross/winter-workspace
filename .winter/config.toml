# ===========================================================================
# Provisioning — `winter provision <env>` lifecycle handlers
#
# Dependency install: one feature-environment handler per project that needs
# deps. `project = "<name>"` (paul-gross/winter#105) sets cwd to that repo's
# worktree (<env>/<name>/) with parse-time validation against [[project_repository]]
# and a hard error if the worktree is missing — preferred over a hand-rolled `cd`.
# ===========================================================================

[[provision.dependency]]
scope = "feature-environment"
project = "winter"
apply = "cd tools/winter-cli && mise trust . && mise run install"

[[provision.dependency]]
scope = "feature-environment"
project = "winter-test-service"
apply = "uv sync && (cd web && npm install --no-audit --no-fund)"

[[provision.dependency]]
scope = "feature-environment"
project = "winter-docs"
apply = "npm install --no-audit --no-fund"

[[provision.dependency]]
scope = "feature-environment"
project = "winter-plugin-api"
apply = "uv sync"

# ===========================================================================
# Per-env RabbitMQ slice — carves a vhost + user `wts-<env>` out of the shared
# workspace broker (container `wws-rabbitmq`, declared scope="workspace" in the
# docker manifest). `required_services` gates on it being up first; cwd = env
# root; WINTER_ENV is set. apply is idempotent (skip add_* when present, always
# re-assert permissions); destroy tolerates already-gone entities.
# ===========================================================================

[[provision.resource]]
scope = "feature-environment"
apply = [
  "docker exec wws-rabbitmq rabbitmqctl list_vhosts --quiet | grep -qx \"wts-$WINTER_ENV\" || docker exec wws-rabbitmq rabbitmqctl add_vhost \"wts-$WINTER_ENV\"",
  "docker exec wws-rabbitmq rabbitmqctl list_users --quiet | awk '{print $1}' | grep -qx \"wts-$WINTER_ENV\" || docker exec wws-rabbitmq rabbitmqctl add_user \"wts-$WINTER_ENV\" \"wts-$WINTER_ENV\"",
  "docker exec wws-rabbitmq rabbitmqctl set_permissions -p \"wts-$WINTER_ENV\" \"wts-$WINTER_ENV\" '.*' '.*' '.*'",
]
destroy = [
  "docker exec wws-rabbitmq rabbitmqctl delete_vhost \"wts-$WINTER_ENV\" || true",
  "docker exec wws-rabbitmq rabbitmqctl delete_user \"wts-$WINTER_ENV\" || true",
]
required_services = ["workspace/rabbitmq"]
