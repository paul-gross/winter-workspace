main_branch = "master"

# Per-env port allocation: port base = base_port + index * ports_per_env.
# 20-per-env spacing (alpha=4020, beta=4040, …). winter-test-service uses
# the +10/+11/+12 sub-band per env.
base_port = 4000
ports_per_env = 20

# Env variable bands (see context/winter-cli/configuration/ports-and-environments.md).
# The env-provisioner resolves these per scope and injects them into service
# providers: workspace scope gets only the workspace band; a feature env gets the
# workspace band unioned with the feature band (feature wins key collisions).

# Feature-env variables — per-env, on each env's own port base.
# ${WINTER_PORT_BASE+N} resolves against the env's port base (alpha=4020,
# beta=4040, …), so each env gets its own ports from one template.
[env.feature.vars]
# winter-test-service — ports on the +10/+11/+12 sub-band. Sourced into each
# service pane; also resolve ${WTS_*} in setup-tmux.toml status URLs.
WTS_WEB_PORT = "${WINTER_PORT_BASE+10}"
WTS_API_PORT = "${WINTER_PORT_BASE+11}"
WTS_DB_PORT  = "${WINTER_PORT_BASE+12}"
DATABASE_URL = "postgresql://wts:wts@localhost:${WINTER_PORT_BASE+12}/wts"

# Workspace (index-0) variables — shared across the workspace and inherited by
# every feature env. Reference ${WINTER_WORKSPACE_PORT_BASE+N} (the index-0 band);
# WINTER_PORT_BASE is intentionally unavailable when rendering this band.
[env.workspace.vars]
# Shared RabbitMQ broker — a workspace singleton, so the same AMQP port in every
# env (4001 = workspace band base+1, matching WWS_RABBITMQ_AMQP_PORT).
RABBITMQ_PORT = "${WINTER_WORKSPACE_PORT_BASE+1}"

# Two service providers, bound explicitly. tmux runs the from-source services
# (docs, shell, api, web, worker); winter-service-docker runs the dockerized
# daemons (per-env db, workspace rabbitmq). Order is the `up` fan-out order —
# docker first so the db/broker are up before the tmux api/worker that need them
# (`up <env>` ensures the workspace scope first regardless). Service names are
# globally unique across providers, so logs/restart route to the right one.
[capabilities]
service = ["winter-service-docker", "winter-service-tmux"]

[core_checks.file_size]
injected_bytes = 100000
reference_bytes = 100000

