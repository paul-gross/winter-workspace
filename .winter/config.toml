main_branch = "master"

# Workspace service-namespace prefix. Injected to every service provider as
# WINTER_SERVICE_PREFIX, so tmux sessions are named "wws-<env>" and the docker
# provider namespaces on the same "wws" (matching wws-rabbitmq, WWS_* ports).
service_prefix = "wws"

# Per-env port allocation: port base = base_port + index * ports_per_env.
# 20-per-env spacing (alpha=4020, beta=4040, …). winter-test-service uses
# the +10/+11/+12 sub-band per env.
base_port = 4000
ports_per_env = 20

# Env variable bands (see context/winter-cli/configuration/ports-and-environments.md).
# The env-provisioner resolves these per scope and injects them into service
# providers: workspace scope gets only the workspace band; a feature env gets the
# workspace band unioned with the feature band (feature wins key collisions).

# Feature-env variables — per-env, on each env's own port base.
# ${WINTER_PORT_BASE+N} resolves against the env's port base (alpha=4020,
# beta=4040, …), so each env gets its own ports from one template.
[env.feature.vars]
# winter-test-service — web/api ports on this env's +10/+11 sub-band.
WTS_WEB_PORT = "${WINTER_PORT_BASE+10}"
WTS_API_PORT = "${WINTER_PORT_BASE+11}"
# Postgres is a workspace singleton (container wws-postgres) on the workspace
# band — not a per-env container — so the port is the same for every env. Each
# env connects to its own database + role `wts_<env>` inside that shared
# instance, carved out by the postgres provision resource below (mirroring the
# RabbitMQ per-env vhost). WTS_DB_PORT aliases the workspace-band WWS_POSTGRES_PORT
# (rendered first, already resolved to the +3 band value) rather than re-deriving
# it; DATABASE_URL then interpolates the env name into the per-env db/user/password.
WTS_DB_PORT  = "${WWS_POSTGRES_PORT}"
DATABASE_URL = "postgresql://wts_${WINTER_ENV}:wts_${WINTER_ENV}@localhost:${WTS_DB_PORT}/wts_${WINTER_ENV}"

# Workspace (index-0) variables — shared across the workspace and inherited by
# every feature env. Reference ${WINTER_WORKSPACE_PORT_BASE+N} (the index-0 band);
# WINTER_PORT_BASE is intentionally unavailable when rendering this band.
[env.workspace.vars]
# Shared RabbitMQ broker (workspace singleton). RABBITMQ_PORT is the app-facing
# AMQP port (band base+1 = 4001), inherited by every feature env. WWS_RABBITMQ_*
# are the compose-facing host ports — pre-computed here so workspace-compose.yaml's
# ${WWS_RABBITMQ_*_PORT} refs resolve to the band value (compose does no arithmetic
# of its own), the same treatment as WWS_POSTGRES_PORT below.
RABBITMQ_PORT          = "${WINTER_WORKSPACE_PORT_BASE+1}"
WWS_RABBITMQ_AMQP_PORT = "${WINTER_WORKSPACE_PORT_BASE+1}"
WWS_RABBITMQ_MGMT_PORT = "${WINTER_WORKSPACE_PORT_BASE+2}"
# Shared Postgres singleton host port (workspace band base+3 = 4003). Injected
# into the docker provider on `service up workspace` so workspace-compose.yaml
# publishes wws-postgres on it; the pre-computed value also lets the compose
# `${WWS_POSTGRES_PORT}` ref work (compose does no arithmetic of its own).
WWS_POSTGRES_PORT      = "${WINTER_WORKSPACE_PORT_BASE+3}"

# Two service providers, bound explicitly. tmux runs the from-source services
# (docs, shell, api, web, worker); winter-service-docker runs the dockerized
# daemons (workspace-shared db + rabbitmq). Order is the `up` fan-out order —
# docker first so the db/broker are up before the tmux api/worker that need them
# (`up <env>` ensures the workspace scope first regardless). Service names are
# globally unique across providers, so logs/restart route to the right one.
[capabilities]
service = ["winter-service-docker", "winter-service-tmux"]

[core_checks.file_size]
injected_bytes = 100000
reference_bytes = 100000

